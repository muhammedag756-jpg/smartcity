{% extends 'admin/admin home.html'%}
{% block body%}

<style>
    body {
        background: #f4f6f9;
        font-family: Arial, sans-serif;
    }

    
    .container {
        width: 95%;
        margin: 40px auto;
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead {
        background: #343a40;
        color: white;
    }

    th, td {
        padding: 10px;
        text-align: center;
    }

    tr:nth-child(even) {
        background: #f2f2f2;
    }

    tr:hover {
        background: #e6f2ff;
    }

    .btn {
        padding: 6px 12px;
        border-radius: 5px;
        text-decoration: none;
        color: white;
        font-size: 14px;
        margin: 2px;
        display: inline-block;
    }

    .accept {
        background: #28a745;
    }

    .accept:hover {
        background: #218838;
    }

    .reject {
        background: #dc3545;
    }

    .reject:hover {
        background: #c82333;
    }
</style>

<div class="container">
    <h2>verify user</h2>

    <table>
        <thead>
            <tr>
                <th></th>
                <th> Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Ward</th>
                <th>Address</th>
                <th>image</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for i in data %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ i.name }}</td>
                <td>{{ i.phone }}</td>
                <td>{{ i.email }}</td>
                <td>{{ i.ward }}</td>
                <td>{{ i.place}},{{i.pin}},{{i.ward}},{{i.post}}</td>
                <td>
    <a href="{{ i.image.url }}" target="_blank">
        <img src="{{ i.image.url }}" height="80px" width="80px" style="border-radius:5px;">
    </a>
</td>
                <td>
                    <a href="/myapp/accept_user/{{i.id}}" class="btn accept">Accept</a>
                    <a href="/myapp/reject_user/{{i.id}}" class="btn reject">Reject</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
