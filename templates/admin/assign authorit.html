{% extends 'admin/admin home.html'%}
{% block body%}

<style>
    body {
        background: #f4f6f9;
        font-family: Arial, sans-serif;
    }

    .form-container {
        width: 400px;
        margin: 60px auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #555;
    }

    input, select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 5px;
        outline: none;
    }

    input:focus, select:focus {
        border-color: #007bff;
    }

    .btn {
        width: 100%;
        padding: 10px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 15px;
        cursor: pointer;
    }

    .btn:hover {
        background: #0056b3;
    }
</style>

<div class="form-container">
    <h2>Assign Authority</h2>

    <form method="post">
        {% csrf_token %}

        <!-- Authority Dropdown -->
        <div class="form-group">
            <label>Select Authority</label>
            <select name="authority" required>
                <option value="">-- Select Authority --</option>
                {% for a in authority %}
                    <option value="{{ a.id }}">{{ a.name }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn">Assign</button>
    </form>
</div>

{% endblock %}
