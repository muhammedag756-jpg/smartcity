{% extends 'admin/admin home.html'%}
{% block body%}

<style>
    body {
        background: #f4f6f9;
        font-family: Arial, sans-serif;
    }

    .container {
        width: 90%;
        margin: 40px auto;
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    .top-bar {
        text-align: right;
        margin-bottom: 15px;
    }

    .add-btn {
        padding: 8px 15px;
        background: #28a745;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-size: 14px;
    }

    .add-btn:hover {
        background: #218838;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead {
        background: #343a40;
        color: white;
    }

    th, td {
        padding: 10px;
        text-align: center;
    }

    tr:nth-child(even) {
        background: #f2f2f2;
    }

    tr:hover {
        background: #e6f2ff;
    }

    .btn {
        padding: 5px 10px;
        border-radius: 5px;
        text-decoration: none;
        color: white;
        font-size: 13px;
    }

    .edit-btn {
        background: #007bff;
    }

    .edit-btn:hover {
        background: #0056b3;
    }

    .delete-btn {
        background: #dc3545;
    }

    .delete-btn:hover {
        background: #c82333;
    }
</style>

<div class="container">
    <h2>Authority Management</h2>

    <!-- Add Button -->
    <div class="top-bar">
        <a href="/myapp/admin_addauthority/" class="add-btn">+ Add Authority</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Sl No</th>
                <th>Name</th>
                <th>Type</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for i in data %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ i.name }}</td>
                <td>{{ i.type }}</td>
                <td>{{ i.phone }}</td>
                <td>{{ i.email }}</td>
                <td>
                    <a href="/myapp/admin_edit/{{ i.id }}" class="btn edit-btn">Edit</a>
                    <a href="/myapp/delete_authority/{{ i.id }}" class="btn delete-btn">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
