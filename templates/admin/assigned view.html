<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assigned Details</title>
</head>
<body>

<style>
    body {
        background: #f4f6f9;
        font-family: Arial, sans-serif;
    }

    .container {
        width: 80%;
        margin: 40px auto;
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead {
        background: #343a40;
        color: white;
    }

    th, td {
        padding: 10px;
        text-align: center;
    }

    tr:nth-child(even) {
        background: #f2f2f2;
    }

    tr:hover {
        background: #e6f2ff;
    }
</style>

<div class="container">
    <h2>Assigned Details</h2>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Task</th>
                <th>User</th>
                <th>Assigned By</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody>
            {% for i in data %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ i.REQUEST.title }}</td>
                <td>{{ i.REQUEST.USER.name }}</td>
                <td>{{ i.AUTHORITY.name }}</td>
                <td>{{ i.date }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">No assigned tasks available</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
