{% extends 'user/user home.html'%}
{% block body%}

<style>
    body {
        background: #f4f6f9;
        font-family: Arial, sans-serif;
    }

    .container {
        width: 95%;
        margin: 40px auto;
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead {
        background: #007bff;
        color: white;
    }

    th, td {
        padding: 10px;
        text-align: center;
    }

    tr:nth-child(even) {
        background: #f2f2f2;
    }

    tr:hover {
        background: #e6f2ff;
    }

    img {
        width: 80px;
        height: 60px;
        object-fit: cover;
        border-radius: 5px;
    }

    .status {
        padding: 5px 10px;
        border-radius: 5px;
        color: white;
        font-size: 13px;
    }

    .pending {
        background: orange;
    }

    .completed {
        background: green;
    }

    .btn {
        padding: 6px 12px;
        background: #17a2b8;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-size: 14px;
    }

    .btn:hover {
        background: #138496;
    }
</style>

<div class="container">
    <h2>Your Complaints / Requests</h2>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Title</th>
                <th>Description</th>
                <th>Image</th>
                <th>Status</th>
                <th>Assigned</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for i in data %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ i.title }}</td>
                <td>{{ i.descreption }}</td>

                <!-- FIX: display image properly -->
                <td>
                    <img src="{{ i.image.url }}" alt="image">
                </td>

                <!-- Dynamic status styling -->
                <td>
                    <span class="status {% if i.status == 'completed' %}completed{% else %}pending{% endif %}">
                        {{ i.status }}
                    </span>
                </td>

                <td>{{ i.assign }}</td>

                <td>
                    <a href="/myapp/user_viewassigned/{{i.id}}" class="btn">
                        View Assigned
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
